<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Velha - WebSocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Jogo da Velha</h1>
        <div id="status" class="mb-4">Carregando...</div>
        <div id="board" class="grid grid-cols-3 gap-2 mb-4" style="display: none;">
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="0" data-col="0"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="0" data-col="1"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="0" data-col="2"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="1" data-col="0"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="1" data-col="1"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="1" data-col="2"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="2" data-col="0"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="2" data-col="1"></div>
            <div class="cell w-16 h-16 border border-gray-400 flex items-center justify-center text-2xl font-bold cursor-pointer" data-row="2" data-col="2"></div>
        </div>
        <button id="createRoom" class="bg-blue-500 text-white px-4 py-2 rounded">Criar Sala</button>
        <div id="roomLink" class="mt-4" style="display: none;"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
